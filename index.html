<!DOCTYPE html>
<html>
<head>
    <script src="blender.js"></script>
    <style>
        #output {
            width: 300px;
            height: 150px;
            border: 1px solid black;
            position: relative;
        }
        /* body{
            font-family: Arial;
        } */
         
         /* Authur: A. silinga 224108331 */
        

        
    </style>
</head>
<body>

<h1>Mr. Surname Blender</h1>

<div>
    <span>Surname:</span>
    <input id="surname" type="text">
</div>

<div>
    <span>Font:</span>
    <select id="font">
        <option>Arial</option>
        <option>Verdana</option>
        <option>Times New Roman</option>
        <option>Comic Sans MS</option>
    </select>
</div>

<div>
    <span>Position:</span>
    <input type="radio" name="pos" value="seq" checked> Sequential
    <input type="radio" name="pos" value="rand"> Random
    <input type="radio" name="pos" value="rev"> Reverse
</div>

<div>
    Color:
    <select id="color">
        <option>black</option>
        <option>red</option>
        <option>blue</option>
        <option>green</option>
    </select>

    Font Size:
    <input id="size" type="number" value="16">
</div>

<button id="blend" style="background-color: chartreuse;" >Blend Now</button>

<div id="output"></div>

</body>
</html>
